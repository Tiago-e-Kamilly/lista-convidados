<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Presença ♥ Casamento</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --marsala: #7B2D3E;
  --marsala-light: #9E4057;
  --marsala-dark: #4A1624;
  --marsala-soft: #C4768A;
  --cream: #FBF7F2;
  --gold: #C9A96E;
  --gold-light: #E8D5A3;
  --green: #2E7D32;
  --green-bg: #EAF4EA;
  --amber: #7D5A00;
  --text-dark: #2C1A20;
  --text-mid: #6B3D4A;
  --white: #FFFFFF;
  --shadow: rgba(123,45,62,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(160deg, var(--marsala-dark) 0%, var(--marsala) 55%, #B54060 100%);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.login-box {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(201,169,110,0.4);
  border-radius: 4px; padding: 52px 48px 48px; width: 360px; max-width: 92vw;
  backdrop-filter: blur(16px); text-align: center;
  animation: slideUp .7s cubic-bezier(.16,1,.3,1) both;
}
.login-rings { font-size: 34px; margin-bottom: 14px; animation: pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
.login-title { font-family: 'Cinzel', serif; font-size: 20px; color: #fff; letter-spacing: 4px; margin-bottom: 4px; }
.login-names { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--gold-light); font-size: 17px; margin-bottom: 34px; }
.login-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2.5px; color: var(--gold-light); text-align: left; display: block; margin-bottom: 7px; }
.login-input {
  width: 100%; padding: 13px 16px;
  background: rgba(255,255,255,0.09); border: 1px solid rgba(201,169,110,0.3);
  border-radius: 3px; color: #fff; font-size: 16px; font-family: 'Lato', sans-serif;
  outline: none; transition: all .2s; letter-spacing: 4px; text-align: center;
}
.login-input:focus { border-color: var(--gold); background: rgba(255,255,255,0.14); }
.login-input::placeholder { letter-spacing: 1px; color: rgba(255,255,255,0.3); font-size: 13px; }
.login-btn {
  margin-top: 24px; width: 100%; padding: 14px;
  background: linear-gradient(135deg, var(--gold) 0%, #A87830 100%);
  border: none; border-radius: 3px; color: var(--marsala-dark);
  font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; font-weight: 600;
  cursor: pointer; transition: opacity .2s, transform .1s;
}
.login-btn:hover { opacity: .9; transform: translateY(-1px); }
.login-error { margin-top: 12px; color: #FFBBBB; font-size: 13px; font-family: 'Cormorant Garamond', serif; font-style: italic; display: none; }

/* APP */
#app { display: none; }

.header {
  background: linear-gradient(160deg, var(--marsala-dark) 0%, var(--marsala) 55%, #B54060 100%);
  padding: 44px 24px 34px; text-align: center; position: relative; overflow: hidden;
}
.header::before {
  content:''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='52' height='52' viewBox='0 0 52 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C9A96E' fill-opacity='0.07'%3E%3Cpath d='M26 1l2.4 7.4H36L30 12.9l2.4 7.4L26 16l-6.4 4.3 2.4-7.4L16 8.4h7.6z'/%3E%3C/g%3E%3C/svg%3E");
}
.header-orn { color: var(--gold); font-size: 20px; letter-spacing: 12px; margin-bottom: 8px; position: relative; opacity: .75; }
.header h1 { font-family: 'Cinzel', serif; font-size: clamp(20px,4vw,32px); color: #fff; font-weight: 400; letter-spacing: 5px; position: relative; }
.header-line { display: flex; align-items: center; justify-content: center; gap: 14px; margin: 10px 0; position: relative; }
.header-line hr { width: 70px; border: none; border-top: 1px solid rgba(201,169,110,.5); }
.header-heart { color: var(--gold); font-size: 16px; }
.header-sub { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--gold-light); font-size: 16px; position: relative; }

/* STATS */
.stats-bar { background: #fff; border-bottom: 2px solid var(--gold-light); display: flex; flex-wrap: wrap; }
.stat { flex: 1; min-width: 80px; padding: 16px 8px; text-align: center; border-right: 1px solid rgba(201,169,110,.2); }
.stat:last-child { border-right: none; }
.stat-n { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 600; display: block; }
.stat-l { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-mid); }

/* TOOLBAR */
.toolbar { max-width: 960px; margin: 24px auto 0; padding: 0 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.search-wrap { flex: 1; min-width: 180px; position: relative; }
.search-wrap input {
  width: 100%; padding: 11px 14px 11px 38px;
  border: 1.5px solid var(--gold-light); border-radius: 3px;
  font-family: 'Lato', sans-serif; font-size: 13.5px; color: var(--text-dark); background: #fff; outline: none; transition: border .2s;
}
.search-wrap input:focus { border-color: var(--marsala-soft); }
.search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--marsala-soft); pointer-events: none; font-size: 14px; }
.chip {
  padding: 10px 16px; border: 1.5px solid var(--gold-light); border-radius: 20px;
  background: #fff; font-family: 'Cinzel', serif; font-size: 9px;
  letter-spacing: 1.5px; color: var(--text-mid); cursor: pointer; transition: all .2s; white-space: nowrap;
}
.chip:hover { border-color: var(--marsala-soft); color: var(--marsala); }
.chip.active { background: var(--marsala); color: #fff; border-color: var(--marsala); }
.btn-add {
  padding: 11px 20px; background: var(--marsala); border: none; border-radius: 3px;
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: #fff; cursor: pointer; transition: opacity .2s; white-space: nowrap;
}
.btn-add:hover { opacity: .88; }
.btn-print {
  padding: 11px 20px; background: linear-gradient(135deg, var(--gold), #A87830);
  border: none; border-radius: 3px; font-family: 'Cinzel', serif; font-size: 10px;
  letter-spacing: 2px; color: var(--marsala-dark); cursor: pointer; font-weight: 600; white-space: nowrap; transition: opacity .2s;
}
.btn-print:hover { opacity: .88; }

/* GUEST CARDS */
.list-wrap { max-width: 960px; margin: 18px auto 48px; padding: 0 16px; }

.guest-card {
  background: #fff; border: 1px solid rgba(201,169,110,.22);
  border-left: 4px solid var(--gold);
  border-radius: 4px; margin-bottom: 9px;
  display: grid;
  grid-template-columns: 38px 1fr 160px auto auto;
  align-items: center;
  transition: box-shadow .2s, border-color .2s;
  animation: slideUp .25s ease both;
  overflow: hidden;
}
.guest-card:hover { box-shadow: 0 4px 18px var(--shadow); }
.guest-card.confirmed { border-left-color: var(--green); }
.guest-card.declined  { border-left-color: var(--marsala-soft); }
.guest-card.pending   { border-left-color: var(--gold); }

.card-num { font-family: 'Cinzel', serif; font-size: 10px; color: var(--marsala-soft); text-align: center; padding: 0 2px; user-select: none; }

/* NAME COL */
.card-name-col { padding: 13px 12px; display: flex; flex-direction: column; gap: 6px; }
.name-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.name-display { font-size: 14px; color: var(--text-dark); }
.name-input {
  display: none; border: 1px solid var(--marsala-soft); border-radius: 3px;
  padding: 4px 8px; font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text-dark); outline: none; width: 180px;
}
.name-input:focus { border-color: var(--marsala); }
.icn-btn { background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px; line-height: 1; color: var(--marsala-soft); transition: color .15s; }
.icn-btn:hover { color: var(--marsala); }
.save-icn { color: var(--gold); display: none; }

/* TIPO BADGE — shown below name */
.tipo-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 11px 3px 8px; border-radius: 20px;
  font-size: 11px; font-family: 'Lato', sans-serif; font-weight: 700;
  cursor: pointer; user-select: none; transition: all .18s; border: 1.5px solid transparent;
  width: fit-content;
}
.tipo-badge.individual { background: rgba(201,169,110,.13); color: #7D5A00; border-color: rgba(201,169,110,.4); }
.tipo-badge.casal      { background: rgba(123,45,62,.10); color: var(--marsala); border-color: rgba(123,45,62,.3); }
.tipo-badge:hover      { transform: scale(1.05); }

/* PHONE */
.card-phone { padding: 0 8px; }
.phone-inp {
  border: 1.5px solid rgba(201,169,110,.35); border-radius: 3px;
  padding: 8px 10px; font-size: 13px; font-family: 'Lato', sans-serif;
  width: 148px; color: var(--text-dark); outline: none; transition: border .2s; background: transparent;
}
.phone-inp:focus { border-color: var(--marsala-soft); background: #fff; }
.phone-inp::placeholder { color: rgba(0,0,0,.2); font-size: 12px; }

/* CONFIRM TOGGLE */
.card-confirm { padding: 0 8px; }
.confirm-toggle { display: flex; border-radius: 20px; overflow: hidden; border: 1.5px solid rgba(201,169,110,.35); background: #fafafa; }
.conf-btn {
  padding: 8px 13px; border: none; background: transparent;
  font-size: 11px; font-family: 'Cinzel', serif; letter-spacing: .5px;
  cursor: pointer; transition: all .2s; color: var(--text-mid); white-space: nowrap;
}
.conf-btn.yes.on { background: var(--green-bg); color: var(--green); font-weight: 700; }
.conf-btn.no.on  { background: rgba(123,45,62,.08); color: var(--marsala); font-weight: 700; }
.conf-btn:hover  { opacity: .78; }

/* DELETE */
.card-del { padding: 0 10px; }
.del-btn { background: none; border: none; cursor: pointer; color: rgba(123,45,62,.25); font-size: 16px; transition: color .2s; padding: 4px; }
.del-btn:hover { color: var(--marsala); }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--text-mid); font-size: 18px; }

/* MODAL */
.modal-bg {
  position: fixed; inset: 0; background: rgba(74,22,36,.55);
  display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(4px);
}
.modal-bg.open { display: flex; }
.modal {
  background: #fff; border-radius: 4px; padding: 40px 36px 32px; width: 420px; max-width: 94vw;
  box-shadow: 0 20px 60px rgba(74,22,36,.3); animation: slideUp .3s cubic-bezier(.16,1,.3,1) both;
}
.modal h2 { font-family: 'Cinzel', serif; font-size: 15px; letter-spacing: 3px; color: var(--marsala); margin-bottom: 24px; text-align: center; }
.modal label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 2px; color: var(--text-mid); display: block; margin-bottom: 6px; margin-top: 16px; }
.modal input, .modal select {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--gold-light); border-radius: 3px;
  font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text-dark); outline: none; transition: border .2s;
}
.modal input:focus, .modal select:focus { border-color: var(--marsala-soft); }
.modal-btns { display: flex; gap: 10px; margin-top: 24px; }
.modal-cancel {
  flex: 1; padding: 12px; border: 1.5px solid var(--gold-light); border-radius: 3px;
  background: #fff; font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: var(--text-mid); cursor: pointer; transition: all .2s;
}
.modal-cancel:hover { border-color: var(--marsala-soft); color: var(--marsala); }
.modal-save {
  flex: 2; padding: 12px; background: var(--marsala); border: none; border-radius: 3px;
  font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 2px; color: #fff; cursor: pointer; transition: opacity .2s;
}
.modal-save:hover { opacity: .88; }

.footer { text-align: center; padding: 20px; font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--marsala-soft); font-size: 13px; opacity: .6; }

@keyframes slideUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

/* PRINT */
@media print {
  body { background: #fff; }
  #login-screen { display: none !important; }
  #app { display: block !important; }
  .toolbar, .btn-print, .btn-add, .icn-btn, .del-btn, .modal-bg { display: none !important; }
  .header { -webkit-print-color-adjust: exact; print-color-adjust: exact; padding: 24px; }
  .guest-card { break-inside: avoid; box-shadow: none; margin-bottom: 4px; border: 1px solid #ddd; border-left: 4px solid #999; }
  .guest-card.confirmed { border-left-color: #2E7D32; }
  .guest-card.declined  { border-left-color: #C4768A; }
  .phone-inp { border: none; background: transparent; }
  .confirm-toggle { border: 1px solid #ccc; }
  .tipo-badge { border: 1px solid #ccc; }
  .name-input { display: none !important; }
  .name-display { display: block !important; }
}

@media (max-width: 680px) {
  .guest-card { grid-template-columns: 30px 1fr auto; grid-template-rows: auto auto; }
  .card-phone { grid-column: 1 / 3; padding: 0 12px 12px 44px; }
  .card-confirm { grid-column: 3; grid-row: 1 / 3; align-self: center; }
  .card-del { grid-column: 1; grid-row: 2; padding-bottom: 12px; }
  .phone-inp { width: 100%; }
  .card-num { align-self: start; padding-top: 16px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-rings">💍</div>
    <div class="login-title">LISTA DE PRESENÇA</div>
    <div class="login-names">Nosso Casamento ♥</div>
    <label class="login-label">SENHA DE ACESSO</label>
    <input class="login-input" type="password" id="login-pass" placeholder="Digite a senha"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">ENTRAR</button>
    <div class="login-error" id="login-error">Senha incorreta — tente novamente</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-orn">✦ ✦ ✦</div>
    <h1>LISTA DE PRESENÇA</h1>
    <div class="header-line"><hr><div class="header-heart">♥</div><hr></div>
    <div class="header-sub">Nosso Grande Dia</div>
  </div>

  <div class="stats-bar">
    <div class="stat"><span class="stat-n" id="s-total" style="color:var(--marsala)">0</span><span class="stat-l">Total</span></div>
    <div class="stat"><span class="stat-n" id="s-conf"  style="color:var(--green)">0</span><span class="stat-l">Confirmados</span></div>
    <div class="stat"><span class="stat-n" id="s-pend"  style="color:var(--amber)">0</span><span class="stat-l">Pendentes</span></div>
    <div class="stat"><span class="stat-n" id="s-nao"   style="color:var(--marsala-soft)">0</span><span class="stat-l">Não Virão</span></div>
    <div class="stat"><span class="stat-n" id="s-casais" style="color:var(--marsala)">0</span><span class="stat-l">Casais</span></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input type="text" placeholder="Buscar convidado…" oninput="render()">
    </div>
    <button class="chip active" id="chip-todos"  onclick="setFilter('todos')">Todos</button>
    <button class="chip"        id="chip-conf"   onclick="setFilter('sim')">✓ Confirmados</button>
    <button class="chip"        id="chip-pend"   onclick="setFilter('pendente')">· Pendentes</button>
    <button class="chip"        id="chip-nao"    onclick="setFilter('nao')">✕ Não virão</button>
    <button class="btn-add"  onclick="openModal()">+ ADICIONAR</button>
    <button class="btn-print" onclick="window.print()">✦ IMPRIMIR</button>
  </div>

  <div class="list-wrap" id="list"></div>
  <div class="footer">feito com amor ♥ acesso exclusivo dos noivos</div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>✦ NOVO CONVIDADO ✦</h2>
    <label>NOME</label>
    <input type="text" id="m-nome" placeholder="Nome completo" onkeydown="if(event.key==='Enter')addGuest()">
    <label>TELEFONE</label>
    <input type="tel" id="m-tel"  placeholder="(00) 00000-0000">
    <label>TIPO</label>
    <select id="m-tipo">
      <option value="Individual">👤 Individual</option>
      <option value="Casal">👫 Casal</option>
    </select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">CANCELAR</button>
      <button class="modal-save"   onclick="addGuest()">ADICIONAR ♥</button>
    </div>
  </div>
</div>

<script>
const SENHA = 'kamilly2027';
const KEY   = 'presenca_casamento_v4';

const NAMES = [
  "Nubia","Beniton","Silvia Letícia","Fabinho","Marcos","Edilaine","Josi","Max","João","Miriam",
  "Daniele","Eyshila","Weveli","Cláudia","Angelma","Edmarzinho","Alini","Pastor","Thamiris","Mariana",
  "Ana Lucia","Nicelma","Tia Zilda","Marlene","Assis","Nily","Coutinho","Edemar / Vilma","Gaby","Tia Zeni",
  "Tio Walmir","Tia Lina","Tio Waldir","Sara","Lucas","Julia","Jéssica","Davi","Camila","Eric",
  "Dayane","Jefin","Daniel","Manu","Amanda","João Artur","Pedro","Nina","Ester","Ester Crispim",
  "Maria Clara","Thalita","Valentina","Elena","Débora","Isabela","Sávio","Mariana","Samila","Bia",
  "Julia","Leandro (Bia)","Tia Néia","Vô","Ruan","Riquelme","Mãe Junior","Tia Vanessa","Tio Alair","Tia Aline",
  "Tio Dudu","Ch","Jean","Alexandre","Vó","Vo","Pai","Lara","Oscarla","Jordana",
  "Adriana","Tadeu","Solange","Vó Adir","Tia Lúcia","Tia Marli","Tio Lair","Esposa Tio Lair","Tio Jora","Esposa Tio Jora",
  "Raquel","Paulo (Marido Raquel)","Rafael","Vanessa (Esposa Rafael)","Filipe","Paula","Raphael","Emanuela","Alessandra","Lorrane",
  "Roberta","João","Carol (Esposa João)","Fred","Lais"
];

function initData() {
  return NAMES.map((n, i) => ({ id: i + 1, nome: n, tel: '', tipo: 'Individual', status: 'pendente' }));
}
function load() {
  try { const d = JSON.parse(localStorage.getItem(KEY)); if (d && d.length) return d; } catch(e){}
  return initData();
}
function save() { localStorage.setItem(KEY, JSON.stringify(guests)); }

let guests = load();
let filter = 'todos';

/* LOGIN */
function doLogin() {
  if (document.getElementById('login-pass').value === SENHA) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('login-pass').value = '';
    setTimeout(() => err.style.display = 'none', 2500);
  }
}

/* FILTER */
function setFilter(f) {
  filter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  const map = { todos:'chip-todos', sim:'chip-conf', pendente:'chip-pend', nao:'chip-nao' };
  document.getElementById(map[f])?.classList.add('active');
  render();
}

/* STATS */
function updateStats() {
  document.getElementById('s-total').textContent  = guests.length;
  document.getElementById('s-conf').textContent   = guests.filter(g => g.status === 'sim').length;
  document.getElementById('s-pend').textContent   = guests.filter(g => g.status === 'pendente').length;
  document.getElementById('s-nao').textContent    = guests.filter(g => g.status === 'nao').length;
  document.getElementById('s-casais').textContent = guests.filter(g => g.tipo === 'Casal').length;
}

/* RENDER */
function render() {
  const q = (document.querySelector('.toolbar input')?.value || '').toLowerCase().trim();
  const list = document.getElementById('list');
  list.innerHTML = '';

  const visible = guests.filter(g => {
    const ms = filter === 'todos' || g.status === filter;
    const mq = !q || g.nome.toLowerCase().includes(q);
    return ms && mq;
  });

  if (!visible.length) {
    list.innerHTML = '<div class="empty">Nenhum convidado encontrado ♥</div>';
    updateStats(); return;
  }

  visible.forEach((g) => {
    const num = guests.indexOf(g) + 1;
    const cls = g.status === 'sim' ? 'confirmed' : g.status === 'nao' ? 'declined' : 'pending';
    const tipoClass = g.tipo === 'Casal' ? 'casal' : 'individual';
    const tipoIcon  = g.tipo === 'Casal' ? '👫' : '👤';

    const card = document.createElement('div');
    card.className = `guest-card ${cls}`;
    card.dataset.id = g.id;
    card.innerHTML = `
      <div class="card-num">${num}</div>

      <div class="card-name-col">
        <div class="name-row">
          <span class="name-display" id="nd-${g.id}">${esc(g.nome)}</span>
          <input class="name-input" id="ni-${g.id}" value="${esc(g.nome)}"
            onkeydown="if(event.key==='Enter')saveName(${g.id})">
          <button class="icn-btn" id="eb-${g.id}" onclick="startEdit(${g.id})" title="Editar nome">✏️</button>
          <button class="icn-btn save-icn" id="sb-${g.id}" onclick="saveName(${g.id})" title="Salvar">✔️</button>
        </div>
        <span class="tipo-badge ${tipoClass}" onclick="toggleTipo(${g.id})" title="Clique para alternar tipo">
          ${tipoIcon} ${g.tipo}
        </span>
      </div>

      <div class="card-phone">
        <input class="phone-inp" type="tel" placeholder="(00) 00000-0000"
          value="${esc(g.tel)}"
          oninput="updateG(${g.id},'tel',this.value)"
          onblur="fmtPhone(this,${g.id})">
      </div>

      <div class="card-confirm">
        <div class="confirm-toggle">
          <button class="conf-btn yes ${g.status==='sim'?'on':''}" onclick="setStatus(${g.id},'sim')">✓ Sim</button>
          <button class="conf-btn no  ${g.status==='nao'?'on':''}" onclick="setStatus(${g.id},'nao')">✕ Não</button>
        </div>
      </div>

      <div class="card-del">
        <button class="del-btn" onclick="deleteGuest(${g.id})" title="Remover convidado">🗑</button>
      </div>
    `;
    list.appendChild(card);
  });

  updateStats();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

/* ACTIONS */
function updateG(id, field, val) {
  const g = guests.find(x => x.id === id);
  if (g) { g[field] = val; save(); }
}

function setStatus(id, s) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  g.status = (g.status === s) ? 'pendente' : s;
  save(); render();
}

function toggleTipo(id) {
  const g = guests.find(x => x.id === id);
  if (!g) return;
  g.tipo = g.tipo === 'Casal' ? 'Individual' : 'Casal';
  save(); render();
}

function startEdit(id) {
  document.getElementById('nd-'+id).style.display = 'none';
  document.getElementById('ni-'+id).style.display = 'inline-block';
  document.getElementById('eb-'+id).style.display = 'none';
  document.getElementById('sb-'+id).style.display = 'inline-block';
  document.getElementById('ni-'+id).focus();
}

function saveName(id) {
  const inp = document.getElementById('ni-'+id);
  const val = inp.value.trim();
  if (!val) return;
  updateG(id, 'nome', val);
  document.getElementById('nd-'+id).textContent = val;
  document.getElementById('nd-'+id).style.display = '';
  inp.style.display = 'none';
  document.getElementById('eb-'+id).style.display = '';
  document.getElementById('sb-'+id).style.display = 'none';
}

function fmtPhone(inp, id) {
  let v = inp.value.replace(/\D/g, '');
  if (v.length === 11) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
  else if (v.length === 10) v = `(${v.slice(0,2)}) ${v.slice(2,6)}-${v.slice(6)}`;
  inp.value = v;
  updateG(id, 'tel', v);
}

function deleteGuest(id) {
  if (!confirm('Remover este convidado da lista?')) return;
  guests = guests.filter(x => x.id !== id);
  save(); render();
}

/* MODAL */
function openModal() {
  document.getElementById('m-nome').value = '';
  document.getElementById('m-tel').value  = '';
  document.getElementById('m-tipo').value = 'Individual';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-nome').focus(), 100);
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function addGuest() {
  const nome = document.getElementById('m-nome').value.trim();
  if (!nome) { document.getElementById('m-nome').focus(); return; }
  const tel  = document.getElementById('m-tel').value.trim();
  const tipo = document.getElementById('m-tipo').value;
  guests.push({ id: Date.now(), nome, tel, tipo, status: 'pendente' });
  save(); closeModal(); setFilter('todos');
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }), 150);
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
